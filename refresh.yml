name: Daily sprint data refresh

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST every day
  workflow_dispatch:        # manual trigger anytime

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Fetch latest sprint data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
        run: python fetch_data.py   # auto-detects latest sprint tab

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh sprint data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
