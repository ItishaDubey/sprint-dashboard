<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f7f6f2;--card:#fff;--border:#e8e6df;--text:#111;--muted:#777;--hint:#bbb;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.hdr-right{text-align:right;}
.hdr-updated{font-size:12px;color:var(--hint);}
.admin-btn{display:inline-block;margin-top:6px;font-size:11px;color:var(--hint);text-decoration:none;border:1px solid var(--border);padding:3px 10px;border-radius:6px;}
.admin-btn:hover{color:#111;}
.stats{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;gap:28px;flex-wrap:wrap;overflow-x:auto;}
.stat{display:flex;flex-direction:column;min-width:60px;}
.stat-n{font-size:26px;font-weight:700;line-height:1;}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.sdiv{width:1px;background:var(--border);align-self:stretch;}
.blockers-wrap{margin:20px 32px 0;}
.blockers-box{background:#fff5f5;border:1.5px solid #fca5a5;border-radius:12px;overflow:hidden;}
.blockers-hdr{background:#fee2e2;padding:10px 18px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#991b1b;}
.blocker-row{padding:10px 18px;border-top:1px solid #fecaca;display:flex;gap:12px;align-items:flex-start;}
.blocker-pod{font-size:11px;font-weight:600;color:#dc2626;background:#fee2e2;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.blocker-feat{font-size:13px;color:#111;font-weight:500;}
.blocker-note{font-size:12px;color:#b91c1c;margin-top:2px;}
.main{padding:20px 32px 40px;}
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:24px 0 12px;}
.pods{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}
.pod{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.pod-head{padding:14px 18px 10px;}
.pod-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pod-name{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pod-ct{font-size:12px;color:var(--muted);}
.pod-lead{font-size:12px;color:var(--muted);margin-bottom:4px;}
.pod-lead span{font-weight:600;color:#444;}
.pod-note{font-size:11px;color:#666;font-style:italic;margin-bottom:6px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--bg);color:#555;}
.tag-lead{background:#111;color:#fff;}
.divider{height:1px;background:var(--border);}
.items{padding:4px 0 10px;}
.item{padding:7px 18px;display:flex;gap:8px;}
.item:hover{background:#fafaf8;}
.idot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.ibody{flex:1;min-width:0;}
.ititle{font-size:13px;line-height:1.4;color:#111;}
.imeta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center;}
.jira{font-size:10px;font-family:monospace;color:var(--hint);}
.pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.p-todo{background:#f3f4f6;color:#6b7280;}
.p-done{background:#dcfce7;color:#166534;}
.p-qa{background:#d1fae5;color:#065f46;}
.p-prog{background:#dbeafe;color:#1e40af;}
.p-rev{background:#fef9c3;color:#854d0e;}
.p-block{background:#fee2e2;color:#991b1b;font-weight:700;}
.asgn{font-size:11px;color:var(--hint);}
.empty{padding:14px 18px;font-size:13px;color:var(--hint);}

/* BANDWIDTH */
.bw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.bw-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 16px;}
.bw-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.bw-name{font-size:14px;font-weight:700;}
.bw-pod{font-size:10px;color:var(--muted);margin-top:1px;}
.bw-load{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.load-light{background:#dcfce7;color:#166534;}
.load-moderate{background:#fef9c3;color:#854d0e;}
.load-heavy{background:#fee2e2;color:#991b1b;}
.bw-tasks{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.bw-task{font-size:12px;color:var(--muted);padding:2px 0;display:flex;gap:6px;align-items:baseline;}
.bw-task::before{content:"·";color:var(--hint);flex-shrink:0;}
.bw-blocker{font-size:11px;color:#dc2626;margin-top:6px;display:flex;gap:5px;align-items:center;}

/* QA */
.qa-section{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.qa-head{padding:12px 18px;background:#F0F4FF;display:flex;align-items:center;justify-content:space-between;}
.qa-title{font-size:14px;font-weight:700;color:#1e40af;display:flex;align-items:center;gap:7px;}
.qa-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}

/* TEAM UPDATES */
.updates-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
.ucard{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 16px;}
.utype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.uname{font-size:14px;font-weight:600;}
.udesc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
.ustatus{font-size:11px;padding:2px 8px;border-radius:10px;margin-top:6px;display:inline-block;font-weight:600;}
.footer{margin-top:32px;font-size:12px;color:var(--hint);text-align:center;padding-bottom:24px;}

@media(max-width:720px){
  .hdr,.stats,.main,.blockers-wrap{padding-left:16px;padding-right:16px;}
  .pods{grid-template-columns:1fr;}
  .stat-n{font-size:22px;}
  .hdr-title{font-size:17px;}
  .bw-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title" id="t1">Sprint Dashboard</div>
    <div class="hdr-sub" id="t2">Loading…</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-updated" id="t3"></div>

</div>
<div class="stats" id="stats"></div>
<div class="blockers-wrap" id="blockers-wrap"></div>
<div class="main">

  <div class="pods" id="pods"></div>

  <div id="qa-wrap" style="display:none">

    <div class="qa-section">

  </div>

  <div class="slbl" style="margin-top:28px">Team updates</div>
  <div class="updates-grid" id="updates"></div>
  <div class="footer" id="footer"></div>
</div>

function sc(s){if(!s||s==="To Do")return"p-todo";if(s==="Done"||s.toLowerCase().includes("done"))return"p-done";if(s==="In QA")return"p-qa";if(s.toLowerCase().includes("progress"))return"p-prog";if(s.toLowerCase().includes("review"))return"p-rev";if(s.toLowerCase().includes("block")||s==="Bug")return"p-block";return"p-todo";}
function dc(s){if(!s||s==="To Do")return"#d1d5db";if(s.toLowerCase().includes("done")||s==="In QA")return"#16a34a";if(s.toLowerCase().includes("progress")||s.toLowerCase().includes("review"))return"#2563eb";if(s.toLowerCase().includes("block"))return"#dc2626";return"#d1d5db";}
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderItem(i){
  var jira=i.jira&&i.jira!=="-"?'<span class="jira">'+e(i.jira)+"</span>":"";
  var asgn=i.assignee&&i.assignee!=="-"?'<span class="asgn">'+e(i.assignee)+"</span>":"";
  return'<div class="item"><span class="idot" style="background:'+dc(i.status)+'"></span><div class="ibody"><div class="ititle">'+e(i.feature)+'</div><div class="imeta">'+jira+'<span class="pill '+sc(i.status)+'">'+e(i.status||"To Do")+"</span>"+asgn+"</div></div></div>";
}

function renderPod(p){
  var tags=p.team.map(function(t){return'<span class="tag">'+e(t)+"</span>";}).join("");
  var note=p.note?'<div class="pod-note">'+e(p.note)+"</div>":" ";
  var nonBlocked=(p.items||[]).filter(function(i){return!i.status||!i.status.toLowerCase().includes("block");});
  var html=nonBlocked.length?nonBlocked.map(renderItem).join(""):'<div class="empty">No items this sprint</div>';
  return'<div class="pod"><div class="pod-head" style="background:'+p.headBg+'"><div class="pod-top"><span class="pod-name"><span class="dot" style="background:'+p.color+'"></span>'+e(p.name)+'</span><span class="pod-ct">'+(p.items||[]).length+' items</span></div><div class="pod-lead">Lead: <span>'+e(p.lead)+'</span></div>'+note+'<div class="tags"><span class="tag tag-lead">'+e(p.lead)+'</span>'+tags+'</div></div><div class="divider"></div><div class="items">'+html+"</div></div>";
}

function renderBlockers(pods){
  var all=[];
  pods.forEach(function(p){(p.items||[]).forEach(function(i){if(i.status&&i.status.toLowerCase().includes("block"))all.push({pod:p.name,feature:i.feature,note:i.notes,jira:i.jira});});});
  if(!all.length)return"";
  var rows=all.map(function(b){return'<div class="blocker-row"><span class="blocker-pod">'+e(b.pod)+'</span><div><div class="blocker-feat">'+e(b.feature)+(b.jira&&b.jira!=="-"?' <span style="font-size:10px;color:#999;font-family:monospace">'+e(b.jira)+"</span>":"")+'</div>'+(b.note?'<div class="blocker-note">'+e(b.note)+"</div>":"")+"</div></div>";}).join("");
  return'<div class="blockers-box"><div class="blockers-hdr"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#991b1b" stroke-width="1.5"/><path d="M8 4.5v4M8 10.5v1" stroke="#991b1b" stroke-width="1.5" stroke-linecap="round"/></svg> '+all.length+' blocked item'+(all.length>1?"s":"")+" — action required</div>"+rows+"</div>";
}

function renderBandwidth(bw){
  if(!bw||!bw.length)return;
  document.getElementById("bw-wrap").style.display="block";
  var cards=bw.map(function(p){
    var lc="load-"+(p.load||"light");
    var lt=p.load==="heavy"?"Heavy load":p.load==="moderate"?"Moderate":"Light";
    var tasks=(p.tasks||[]).map(function(t){return'<div class="bw-task">'+e(t)+"</div>";}).join("");
    var blocker=p.hasBlocker?'<div class="bw-blocker"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#dc2626" stroke-width="1.5"/><path d="M8 4.5v4M8 10.5v1" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg> Owns a blocker</div>':"";
    return'<div class="bw-card"><div class="bw-top"><div><div class="bw-name">'+e(p.name)+'</div><div class="bw-pod">'+e(p.pod||"")+'</div></div><span class="bw-load '+lc+'">'+lt+'</span></div><div class="bw-tasks">'+tasks+blocker+"</div></div>";
  }).join("");
  document.getElementById("bw-grid").innerHTML=cards;
}

function renderUpdate(u){
  var tc=u.type==="resigned"?"color:#dc2626":u.type==="replacement"?"color:#d97706":u.type==="joining"?"color:#16a34a":"color:#6b7280";
  var tl=u.type==="resigned"?"Resigned":u.type==="replacement"?"Replacement in progress":u.type==="joining"?"Joining":"Update";
  var sc2=u.type==="resigned"?"background:#fee2e2;color:#991b1b":u.type==="replacement"?"background:#fef3c7;color:#92400e":u.type==="joining"?"background:#dcfce7;color:#166534":"background:#f3f4f6;color:#6b7280";
  return'<div class="ucard"><div class="utype" style="'+tc+'">'+e(tl)+'</div><div class="uname">'+e(u.name)+'</div><div class="udesc">'+e(u.detail)+'</div><span class="ustatus" style="'+sc2+'">'+e(u.status)+"</span></div>";
}

    '<div class="stat"><div class="stat-n" style="color:#2563eb">'+s.inProgress+'</div><div class="stat-l">In progress</div></div><div class="sdiv"></div>'+
    '<div class="stat"><div class="stat-n" style="color:#dc2626">'+s.blocked+'</div><div class="stat-l">Blocked</div></div><div class="sdiv"></div>'+
    '<div class="stat"><div class="stat-n">'+s.notStarted+'</div><div class="stat-l">Not started</div></div><div class="sdiv"></div>'+
    '<div class="stat"><div class="stat-n">'+Math.round(s.done/Math.max(s.total,1)*100)+'%</div><div class="stat-l">Completion</div></div><div class="sdiv"></div>'+
    '<div class="stat"><div class="stat-n">4</div><div class="stat-l">Pods</div></div><div class="sdiv"></div>'+
    '<div class="stat"><div class="stat-n">29</div><div class="stat-l">Engineers</div></div>';
  document.getElementById("blockers-wrap").innerHTML=renderBlockers(d.pods);
  document.getElementById("pods").innerHTML=d.pods.map(renderPod).join("");
  var qa=d.qaItems||[];
  if(qa.length){
    document.getElementById("qa-wrap").style.display="block";
    document.getElementById("qa-count").textContent=qa.length+" items";
    document.getElementById("qa-items").innerHTML=qa.map(renderItem).join("");
  }
  renderBandwidth(d.bandwidth);
  document.getElementById("updates").innerHTML=(d.teamUpdates||[]).map(renderUpdate).join("");
  document.getElementById("footer").innerHTML='Auto-refreshed daily at 9:00 AM IST &middot; Sprint '+d.sprintNumber;
}

if(D){render(D);}else{document.getElementById("pods").innerHTML='<div style="padding:40px;color:#999;font-size:14px;grid-column:1/-1">No data — run the GitHub Action.</div>';}
</script>
</body>
</html>
