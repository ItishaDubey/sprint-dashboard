<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f4f0;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}
.hdr{background:#fff;border-bottom:1px solid #e8e6e0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr h1{font-size:17px;font-weight:600;}
.hdr .sub{font-size:12px;color:#888;margin-top:1px;}
.updated{font-size:11px;color:#bbb;}
.stats{background:#fff;border-bottom:1px solid #e8e6e0;padding:10px 28px;display:flex;gap:20px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;}
.stat-n{font-size:20px;font-weight:600;line-height:1;}
.stat-l{font-size:10px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.stat-div{width:1px;background:#e8e6e0;}
.main{padding:20px 28px;max-width:1120px;}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#888;margin:20px 0 10px;}
.pods{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
@media(max-width:680px){.pods{grid-template-columns:1fr;}.main,.hdr,.stats{padding:12px 14px;}}
.pod{background:#fff;border-radius:10px;border:1px solid #e8e6e0;overflow:hidden;}
.pod-head{padding:10px 14px 8px;border-bottom:1px solid #e8e6e0;}
.pod-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.pod-name{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pod-ct{font-size:11px;color:#888;}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tag{font-size:10px;padding:2px 6px;border-radius:10px;background:#f5f4f0;color:#666;}
.tag-pm{background:#111;color:#fff;}
.tag-lead{background:#444;color:#fff;}
.sublbl{padding:5px 14px 1px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#bbb;border-top:1px solid #f5f4f0;margin-top:2px;}
.items{padding:2px 0 8px;}
.item{padding:6px 14px;display:flex;gap:7px;}
.item:hover{background:#faf9f7;}
.idot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.ibody{flex:1;min-width:0;}
.ititle{font-size:12px;line-height:1.4;}
.imeta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center;}
.jira{font-size:9.5px;font-family:monospace;color:#bbb;}
.pill{font-size:9.5px;padding:1px 6px;border-radius:10px;font-weight:500;}
.p-todo{background:#f5f4f0;color:#777;}
.p-done{background:#e8f5e9;color:#2e7d32;}
.p-qa{background:#f1f8e9;color:#388e3c;}
.p-prog{background:#e3f2fd;color:#1565c0;}
.p-rev{background:#fff8e1;color:#e65100;}
.p-block{background:#ffebee;color:#b71c1c;font-weight:700;}
.asgn{font-size:9.5px;color:#bbb;}
.blocker{font-size:9.5px;color:#b71c1c;background:#ffebee;border-radius:4px;padding:1px 5px;margin-top:2px;display:inline-block;}
.updates{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-top:6px;}
.ucard{background:#fff;border-radius:8px;border:1px solid #e8e6e0;padding:9px 12px;}
.utype{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.uname{font-size:13px;font-weight:500;}
.udesc{font-size:11px;color:#888;margin-top:2px;}
.ustatus{font-size:10px;padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block;}
.footer{margin-top:32px;font-size:11px;color:#bbb;text-align:center;padding-bottom:24px;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1 id="t1">Sprint Dashboard</h1>
    <div class="sub" id="t2">Loading…</div>
  </div>
  <div class="updated" id="t3"></div>
</div>
<div class="stats" id="stats"></div>
<div class="main" id="main"></div>

<script>
var D = null; /* DATA_PLACEHOLDER */

function sc(s){
  if(!s||s==="To Do")return"p-todo";
  if(s.includes("Done"))return"p-done";
  if(s==="In QA")return"p-qa";
  if(s.includes("Progress"))return"p-prog";
  if(s.includes("Review"))return"p-rev";
  if(s.includes("Block")||s==="Bug")return"p-block";
  return"p-todo";
}
function dc(s){
  if(!s||s==="To Do")return"#ccc";
  if(s.includes("Done"))return"#2e7d32";
  if(s==="In QA")return"#388e3c";
  if(s.includes("Progress"))return"#1565c0";
  if(s.includes("Review"))return"#e65100";
  if(s.includes("Block"))return"#b71c1c";
  return"#ccc";
}
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderItem(i){
  var bl=i.notes&&i.notes.includes("BLOCKED")?'<div class="blocker">'+e(i.notes.replace("BLOCKED: ",""))+"</div>":"";
  var jira=i.jira&&i.jira!=="-"?'<span class="jira">'+e(i.jira)+"</span>":"";
  var asgn=i.assignee&&i.assignee!=="-"?'<span class="asgn">'+e(i.assignee)+"</span>":"";
  return'<div class="item"><span class="idot" style="background:'+dc(i.status)+'"></span><div class="ibody"><div class="ititle">'+e(i.feature)+'</div><div class="imeta">'+jira+'<span class="pill '+sc(i.status)+'">'+e(i.status||"To Do")+"</span>"+asgn+"</div>"+bl+"</div></div>";
}

function renderPod(p){
  var tags=p.team.map(function(t){return'<span class="tag">'+e(t)+"</span>";}).join("");
  var items=(p.items||[]).map(renderItem).join("");
  return'<div class="pod"><div class="pod-head" style="background:'+p.headBg+'"><div class="pod-top"><span class="pod-name"><span class="dot" style="background:'+p.color+'"></span>'+e(p.name)+'</span><span class="pod-ct">'+(p.items||[]).length+' items</span></div><div class="tags"><span class="tag tag-pm">PM: '+e(p.pm)+'</span><span class="tag tag-lead">TL: '+e(p.lead)+"</span>"+tags+'</div></div><div class="items">'+(items||'<div style="padding:12px 14px;font-size:12px;color:#bbb">No items</div>')+"</div></div>";
}

function renderUpdate(u){
  var tc=u.type==="resigned"?"color:#c62828":u.type==="replacement"?"color:#e65100":"color:#888";
  var tl=u.type==="resigned"?"Resigned":u.type==="replacement"?"Replacement in progress":"Update";
  var sc2=u.type==="resigned"?"background:#ffebee;color:#c62828":u.type==="replacement"?"background:#fff8e1;color:#e65100":"background:#f5f4f0;color:#888";
  return'<div class="ucard"><div class="utype" style="'+tc+'">'+tl+'</div><div class="uname">'+e(u.name)+'</div><div class="udesc">'+e(u.detail)+'</div><span class="ustatus" style="'+sc2+'">'+e(u.status)+"</span></div>";
}

function render(d){
  document.getElementById("t1").textContent="Sprint "+d.sprintNumber+" \u2014 Founder update";
  document.getElementById("t2").textContent=d.sprintDates+" \xb7 All pods \xb7 Auto-updated daily";
  var g=new Date(d.generatedAt);
  document.getElementById("t3").textContent="Updated "+g.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" "+g.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+" IST";
  var s=d.stats;
  document.getElementById("stats").innerHTML=
    '<div class="stat"><div class="stat-n">'+s.total+'</div><div class="stat-l">Total items</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n" style="color:#2e7d32">'+s.done+'</div><div class="stat-l">Done / QA</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n" style="color:#1565c0">'+s.inProgress+'</div><div class="stat-l">In progress</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n" style="color:#b71c1c">'+s.blocked+'</div><div class="stat-l">Blocked</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n">'+s.notStarted+'</div><div class="stat-l">Not started</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n">'+Math.round(s.done/Math.max(s.total,1)*100)+'%</div><div class="stat-l">Completion</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n">4</div><div class="stat-l">Pods</div></div>'+
    '<div class="stat-div"></div>'+
    '<div class="stat"><div class="stat-n">29</div><div class="stat-l">Engineers</div></div>';
  var pods=d.pods.map(renderPod).join("");
  var updates=(d.teamUpdates||[]).map(renderUpdate).join("");
  document.getElementById("main").innerHTML=
    '<div class="slbl">Pods &amp; work items</div><div class="pods">'+pods+'</div>'+
    '<div class="slbl" style="margin-top:24px">Team updates</div><div class="updates">'+updates+'</div>'+
    '<div class="footer">Auto-refreshed daily at 9:00 AM IST from Tech Resource Planning sheet &middot; Sprint '+d.sprintNumber+'</div>';
}

if(D){render(D);}else{
  document.getElementById("main").innerHTML='<div style="padding:40px;color:#888;text-align:center">No data yet — run the GitHub Action to populate.</div>';
}
</script>
</body>
</html>
