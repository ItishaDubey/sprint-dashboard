name: Daily sprint data refresh

on:
  schedule:
    # 3:30 UTC = 9:00 AM IST — runs every day
    - cron: "30 3 * * *"
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            google-auth \
            google-auth-httplib2 \
            google-api-python-client

      - name: Fetch sprint data from Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          SPRINT_SHEET_NAME:           ${{ secrets.SPRINT_SHEET_NAME }}
          RESOURCE_SHEET_NAME:         "Resource Sheet"
        run: python fetch_data.py

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: refresh sprint data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
